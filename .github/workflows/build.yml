name: Build TWRP for citrine

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Recovery
      uses: smoothie-player/action-build-recovery@main
      with:
        MANIFEST_TYPE: twrp
        MANIFEST_BRANCH: twrp-12.1
        DEVICE_TREE: https://github.com/EAGLECOINPREMUIN/android_device_xiaomi_citrine
        DEVICE_TREE_BRANCH: main
        DEVICE_PATH: device/xiaomi/citrine
        DEVICE_NAME: citrine
        MAKEFILE_NAME: twrp_citrine
        BUILD_TARGET: vendorboot
        UPLOAD_RELEASE: true
